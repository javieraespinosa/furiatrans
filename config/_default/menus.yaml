# Navigation Links
#   To link a page section, specify the URL as a hash `/#` followed by the `id` of the section.
#   The `weight` parameter defines the order that the links will appear in.

main:

  - name: Accueil
    url: /
    weight: 1

  - name: A propos
    url: /about
    weight: 10

  - name: Evénements
    url: /events
    weight: 20


  - name: Communauté
    url: /#organizers
    weight: 70  

  - name: Contact
    url: /#contact
    weight: 80    

  - name: Ressources
    weight: 90
    hasChildren: true

  - parent: "Ressources"
    name: Questions de Recherche
    url: /questions
    weight: 91    

  - parent: "Ressources"
    name: Cartographie
    url: /cartographie
    weight: 92    



